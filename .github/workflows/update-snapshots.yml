name: Update Visual Snapshots
on:
  workflow_dispatch:

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v7
      - run: npm ci
      - name: Regenerate all snapshots
        env:
          HOME: /root
          API_KEY: placeholder
        run: npx playwright test tests/ui/visual.spec.ts --project=chromium --project=firefox --project=webkit --update-snapshots
      - name: Upload snapshots
        uses: actions/upload-artifact@v7
        with:
          name: visual-snapshots
          path: tests/ui/visual.spec.ts-snapshots/
          retention-days: 7
