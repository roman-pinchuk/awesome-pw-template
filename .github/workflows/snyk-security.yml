name: Snyk Security Hub & README Matrix

on:
  push:
    branches: [main]
    paths: &dependency_paths
      - '.github/workflows/snyk-security.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths: *dependency_paths
  schedule:
    - cron: '0 0 * * 1' # Weekly Monday sweep
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-pipeline:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    permissions:
      contents: write # For writing back to README.md
      security-events: write # For uploading SARIF files natively to the Security tab
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      # Step 1: Scan for the README matrix security status (JSON output).
      # This is best-effort; the matrix action falls back to dependency inventory.
      - name: Run Snyk for Markdown Generation
        continue-on-error: true
        uses: snyk/actions/node@v1
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          args: --dev --json --json-file-output=snyk-results.json

      # Step 2: Scan for native GitHub Security Alerts (SARIF output)
      - name: Run Snyk for GitHub Security Tab
        continue-on-error: true
        uses: snyk/actions/node@v1
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          args: --dev --sarif-file-output=snyk.sarif

      # Step 3: Stream SARIF findings into GitHub Advanced Security
      - name: Upload Scan Results to GitHub Security Tab
        if: hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif

      # Step 4: Construct and rewrite the Markdown Matrix.
      - name: Generate Dependency Security Matrix
        id: matrix
        uses: roman-pinchuk/dependency-security-matrix-action@v1
        with:
          scanner: snyk
          scanner-report: snyk-results.json
          manifest: package.json
          manifest-type: npm
          readme: README.md
          heading: '## Dynamic Dependency & Security Matrix'

      # Step 5: Save Markdown alterations to git tree (Skips on Pull Requests)
      - name: Commit Matrix Updates
        if: github.event_name != 'pull_request' && steps.matrix.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npx prettier --write README.md
          git add README.md
          if git diff --cached --quiet; then
            echo "No README matrix changes to commit."
          else
            git commit -m "chore: automated update to security matrix"
            git push
          fi
