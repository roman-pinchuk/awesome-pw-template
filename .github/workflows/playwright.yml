name: Playwright

on:
  push:
    branches: ['main']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  api-tests:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      - name: Run API tests
        env:
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
          CTRF_REPORT_FILE: ctrf-api.json
        run: npm run test:api:ci
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 7
      - name: Upload CTRF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ctrf-api
          path: ctrf/ctrf-api.json
          retention-days: 7
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 7

  ui-tests:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: mcr.microsoft.com/playwright:v1.61.1-noble
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      - name: Run UI tests (${{ matrix.browser }})
        env:
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
          HOME: /root
          CTRF_REPORT_FILE: ctrf-${{ matrix.browser }}.json
        run: npx dotenvx run -f .env.production -- npx playwright test --project=${{ matrix.browser }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-ui-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
      - name: Upload CTRF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ctrf-${{ matrix.browser }}
          path: ctrf/ctrf-${{ matrix.browser }}.json
          retention-days: 7
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-ui-${{ matrix.browser }}
          path: allure-results/
          retention-days: 7

  ctrf-report:
    needs: [api-tests, ui-tests]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: ctrf-*
          merge-multiple: true
      - name: Publish CTRF Summary
        uses: ctrf-io/github-test-reporter@v1.1.0
        with:
          report-path: 'ctrf-*.json'
          summary-report: true
          suite-folded-report: true
          group-by: 'suite'

  allure-report:
    needs: [api-tests, ui-tests]
    if: ${{ github.ref == 'refs/heads/main' && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true
      - name: Restore Allure history
        id: cache
        uses: actions/cache/restore@v6
        with:
          path: allure-history/last-history
          key: allure-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            allure-history-${{ github.ref_name }}-
      - name: Seed Allure history
        run: |
          if [ -d allure-history/last-history ] && [ "$(ls -A allure-history/last-history)" ]; then
            mkdir -p allure-results/history
            cp -r allure-history/last-history/. allure-results/history/
          fi
      - name: Generate environment properties
        run: |
          echo "Branch=${{ github.ref_name }}" >> allure-results/environment.properties
          echo "Commit=${{ github.sha }}" >> allure-results/environment.properties
          echo "Workflow URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> allure-results/environment.properties
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.14
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: allure-history
      - name: Save Allure history
        if: always()
        uses: actions/cache/save@v6
        with:
          path: allure-history/last-history
          key: allure-history-${{ github.ref_name }}-${{ github.run_id }}


  allure-deploy:
    needs: [allure-report]
    if: ${{ github.ref == 'refs/heads/main' && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
