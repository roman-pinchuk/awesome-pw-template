name: Playwright

on:
  push:
    branches: ['main']
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check

  api-tests:
    needs: lint
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v7
      - run: npm ci
      - name: Run API tests
        env:
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
          CTRF_REPORT_FILE: ctrf-api.json
        run: npm run test:api:ci
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 7
      - name: Upload CTRF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ctrf-api
          path: ctrf/ctrf-api.json
          retention-days: 7

  ui-tests:
    needs: lint
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.61.1-noble
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
      - run: npm ci
      - name: Run UI tests (${{ matrix.browser }})
        env:
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
          HOME: /root
          CTRF_REPORT_FILE: ctrf-${{ matrix.browser }}.json
        run: npx dotenvx run -f .env.production -- npx playwright test --project=${{ matrix.browser }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-ui-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
      - name: Upload CTRF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ctrf-${{ matrix.browser }}
          path: ctrf/ctrf-${{ matrix.browser }}.json
          retention-days: 7

  ctrf-report:
    needs: [api-tests, ui-tests]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: ctrf-*
          merge-multiple: true
      - name: Publish CTRF Summary
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'ctrf-*.json'
          summary-report: true
