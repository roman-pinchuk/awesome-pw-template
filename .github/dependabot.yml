version: 2
updates:
  # Track npm / package.json dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly' # Bumps packages automatically once a week
      day: 'monday'
    open-pull-requests-limit: 5 # Prevents PR tab from being overwhelmed

    groups:
      all-deps:
        applies-to: version-updates
        patterns:
          - '*'

  # Also tracks GitHub Actions workflows to keep checkout/setup steps fresh
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      actions-stack:
        applies-to: version-updates
        patterns:
          - '*' # Groups all GitHub Actions bumps into a single clean PR
